[test]
name = sparseocilayout_basic
description = Sparse OCI layout assembly with single manifest - verifies marker file, root descriptor, config/manifest blobs present, layer blob absent, layer descriptor present

[file]
name = manifest.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "size": 1469,
    "digest": "sha256:b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5"
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "size": 1024,
      "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1"
    }
  ]
}

[file]
name = config.json
{
  "architecture": "amd64",
  "os": "linux",
  "config": {
    "Env": ["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"],
    "Cmd": ["/bin/sh"]
  },
  "rootfs": {
    "type": "layers",
    "diff_ids": [
      "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1"
    ]
  }
}

[file]
name = layer1_metadata.json
{
  "name": "layer1",
  "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1",
  "size": 1024,
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip"
}

[command]
subcommand = sparse-oci-layout
args = --manifest manifest.json --config config.json --layer layer1_metadata.json --output sparse-output
expect_exit = 0

[assert]
# Sparse OCI layout marker file
file_exists = sparse-output/sparse-oci-layout
file_valid_json = sparse-output/sparse-oci-layout
file_contains = sparse-output/sparse-oci-layout, "1.0.0"
# Must NOT have standard OCI layout files
file_not_exists = sparse-output/oci-layout
file_not_exists = sparse-output/index.json
# Root descriptor
file_exists = sparse-output/root.descriptor.json
file_valid_json = sparse-output/root.descriptor.json
file_contains = sparse-output/root.descriptor.json, "application/vnd.oci.image.manifest.v1+json"
# Config blob must be present
file_exists = sparse-output/blobs/sha256/b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5
# Layer blob must NOT be present (sparse layout)
file_not_exists = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1
# Layer descriptor file must be present
file_exists = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json
file_valid_json = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "application/vnd.oci.image.layer.v1.tar+gzip"
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1"
