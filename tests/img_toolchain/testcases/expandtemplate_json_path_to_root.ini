[test]
name = expandtemplate_json_path_to_root
description = Test expand-template with --json-path-to-root for selecting a sub-object as root

[file]
name = input.json
{
  "templates": {
    "architecture": "{{.base.manifest.architecture}}",
    "os_name": "{{.base.manifest.os}}",
    "user": "{{.base.config.user}}"
  }
}

[file]
name = base_config.json
{
  "deeply": {
    "nested": {
      "user": "testuser",
      "env": {
        "path": "/usr/local/bin:/usr/bin"
      }
    }
  }
}

[file]
name = base_manifest.json
{
  "platform": {
    "architecture": "amd64",
    "os": "linux"
  }
}

[command]
subcommand = expand-template
args = --json-var base.config=base_config.json --json-var base.manifest=base_manifest.json --json-path-to-root base.config=deeply.nested --json-path-to-root base.manifest=platform input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_equals = output.json, architecture, amd64
json_field_equals = output.json, os_name, linux
json_field_equals = output.json, user, testuser
file_not_contains = output.json, "{{."
