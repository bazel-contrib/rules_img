[test]
name = manifest_history
description = rules_img layers carry created_by, base image history is preserved, don't duplicate history from imported images

[file]
name = base_layer.json
{
  "diff_id": "sha256:1111111111111111111111111111111111111111111111111111111111111111",
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
  "digest": "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa",
  "size": 100,
  "history": [{"created_by": "RUN base-image-build-step"}]
}

[file]
name = app_layer.json
{
  "diff_id": "sha256:2222222222222222222222222222222222222222222222222222222222222222",
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
  "digest": "sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb",
  "size": 200,
  "history": [{"created_by": "app-layer"}]
}

[file]
name = base_config.json
{
  "architecture": "amd64",
  "os": "linux",
  "config": {"Env": ["PATH=/usr/bin"]},
  "rootfs": {"type": "layers", "diff_ids": ["sha256:1111111111111111111111111111111111111111111111111111111111111111"]},
  "history": [{"created_by": "DUPLICATE-SHOULD-NOT-APPEAR"}]
}

[command]
subcommand = manifest
args = --base-config base_config.json --layer-from-metadata base_layer.json --layer-from-metadata app_layer.json --config config.json --manifest manifest.json
expect_exit = 0

[assert]
file_exists = config.json
file_valid_json = config.json

file_contains = config.json, "created_by"
file_contains = config.json, "app-layer"
file_contains = config.json, "RUN base-image-build-step"
file_not_contains = config.json, "DUPLICATE-SHOULD-NOT-APPEAR"
json_field_equals = config.json, architecture, amd64
json_field_equals = config.json, os, linux
