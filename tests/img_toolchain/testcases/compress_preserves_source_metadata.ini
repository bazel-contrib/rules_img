[test]
name = compress_preserves_source_metadata
description = Recompressing with source metadata preserves user annotations while replacing stale estargz annotations

[testdata]
copy = input.tar=img_toolchain/hash_tests/test_layer_uncompressed.tar

[file]
name = source_metadata.json
{
  "diff_id": "sha256:old-diff-id",
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
  "digest": "sha256:old-digest",
  "size": 123,
  "annotations": {
    "org.example.keep": "yes",
    "containerd.io/snapshot/stargz/toc.digest": "sha256:old-toc",
    "io.containers.estargz.uncompressed-size": "123"
  },
  "history": [{"created_by": "RUN original-base-step"}]
}

[command]
subcommand = compress
args = --source-metadata source_metadata.json --annotation org.example.override=new --format=gzip --metadata=out_metadata.json input.tar out.tar.gz
expect_exit = 0

[assert]
file_exists = out.tar.gz
file_valid_gzip = out.tar.gz
file_exists = out_metadata.json
file_valid_json = out_metadata.json
file_contains = out_metadata.json, "org.example.keep"
file_contains = out_metadata.json, "yes"
file_contains = out_metadata.json, "org.example.override"
file_contains = out_metadata.json, "new"
file_not_contains = out_metadata.json, "sha256:old-toc"
file_not_contains = out_metadata.json, "io.containers.estargz.uncompressed-size"
file_contains = out_metadata.json, "RUN original-base-step"
