[test]
name = expandtemplate_labels_json_kv_array
description = expand-template parses a JSON array of KEY=VALUE strings (["key=value"])

[file]
name = input.json
{
  "templates": {},
  "newline_delimited_lists_files": {
    "labels": "labels.json"
  }
}

[file]
name = labels.json
[
"org.opencontainers.image.source=https://github.com/example/repo",
"custom.label=custom_value"
]

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_exists = output.json, labels
file_contains = output.json, "org.opencontainers.image.source"
file_contains = output.json, "https://github.com/example/repo"
file_contains = output.json, "custom.label"
file_contains = output.json, "custom_value"
