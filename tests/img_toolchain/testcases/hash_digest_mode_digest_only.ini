[test]
name = hash_digest_mode_digest_only
description = Test hash with only digest mode on a non-tar file (no diff_id computation)

[file]
name = artifact.bin
This is not a tar file, just arbitrary content.

[command]
subcommand = hash
args = --encoding=layer-metadata --digest-mode=digest --name=blob-layer --media-type=application/octet-stream artifact.bin metadata.json
expect_exit = 0

[assert]
file_exists = metadata.json
file_valid_json = metadata.json
json_field_exists = metadata.json, name
json_field_exists = metadata.json, digest
json_field_exists = metadata.json, size
json_field_exists = metadata.json, mediaType
json_field_equals = metadata.json, name, blob-layer
json_field_equals = metadata.json, mediaType, application/octet-stream
file_not_contains = metadata.json, diff_id
