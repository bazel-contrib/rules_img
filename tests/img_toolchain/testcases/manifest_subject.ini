[test]
name = manifest_subject
description = Test manifest with subject descriptor

[file]
name = subject_descriptor.json
{"mediaType":"application/vnd.oci.image.manifest.v1+json","digest":"sha256:5b0bcabd1ed22e9fb1310cf6c2dec7cdef19f0ad69efa1f392e94a4333501270","size":7682}

[command]
subcommand = manifest
args = --subject-descriptor=subject_descriptor.json --manifest=manifest.json --descriptor=descriptor.json
expect_exit = 0

[assert]
file_exists = manifest.json
file_valid_json = manifest.json
json_field_exists = manifest.json, subject
file_contains = manifest.json, "sha256:5b0bcabd1ed22e9fb1310cf6c2dec7cdef19f0ad69efa1f392e94a4333501270"
file_exists = descriptor.json
file_valid_json = descriptor.json
