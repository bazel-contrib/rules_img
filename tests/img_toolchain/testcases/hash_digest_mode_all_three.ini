[test]
name = hash_digest_mode_all_three
description = Test hash with all three digest modes (digest + diff_id + diff_id_annotation)

[testdata]
copy = layer.tar.gz=img_toolchain/hash_tests/test_layer.tar.gz

[command]
subcommand = hash
args = --encoding=layer-metadata --digest-mode=digest --digest-mode=diff_id --digest-mode=diff_id_annotation:io.containerd.image.uncompressed --name=full-layer layer.tar.gz metadata.json
expect_exit = 0

[assert]
file_exists = metadata.json
file_valid_json = metadata.json
json_field_exists = metadata.json, name
json_field_exists = metadata.json, digest
json_field_exists = metadata.json, diff_id
json_field_exists = metadata.json, size
json_field_exists = metadata.json, mediaType
json_field_exists = metadata.json, annotations
json_field_equals = metadata.json, name, full-layer
json_field_equals = metadata.json, mediaType, application/vnd.oci.image.layer.v1.tar+gzip
file_contains = metadata.json, io.containerd.image.uncompressed
file_contains = metadata.json, sha256:
