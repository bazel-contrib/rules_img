[test]
name = manifest_artifact_type
description = Test manifest with artifactType set on the manifest

[command]
subcommand = manifest
args = --artifact-type=application/vnd.cncf.helm.chart.v1 --manifest=manifest.json --descriptor=descriptor.json
expect_exit = 0

[assert]
file_exists = manifest.json
file_valid_json = manifest.json
json_field_exists = manifest.json, artifactType
file_contains = manifest.json, "application/vnd.cncf.helm.chart.v1"
file_exists = descriptor.json
file_valid_json = descriptor.json
file_contains = descriptor.json, "application/vnd.cncf.helm.chart.v1"
