[test]
name = optimize_manifest_rewrite
description = Optimize command preserves source image metadata while replacing layer descriptors and config diff IDs

[file]
name = source_config.json
{
  "architecture": "amd64",
  "os": "linux",
  "author": "rules_img",
  "config": {
    "Labels": {
      "org.example.preserved": "true"
    }
  },
  "rootfs": {
    "type": "layers",
    "diff_ids": ["sha256:old-diff"]
  }
}

[file]
name = source_manifest.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "annotations": {
    "org.example.manifest": "preserved"
  },
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "digest": "sha256:old-config",
    "size": 10
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "digest": "sha256:old-layer",
      "size": 11
    }
  ]
}

[file]
name = source_descriptor.json
{
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "digest": "sha256:old-manifest",
  "size": 12,
  "platform": {
    "architecture": "amd64",
    "os": "linux"
  }
}

[file]
name = layer_metadata.json
{
  "name": "rewritten-layer",
  "diff_id": "sha256:new-diff",
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
  "digest": "sha256:new-layer",
  "size": 42,
  "annotations": {
    "org.example.layer": "preserved"
  }
}

[command]
subcommand = optimize
args = --source-manifest source_manifest.json --source-config source_config.json --source-descriptor source_descriptor.json --layer-from-metadata layer_metadata.json --manifest out_manifest.json --config out_config.json --descriptor out_descriptor.json --digest out_digest
expect_exit = 0

[assert]
file_exists = out_manifest.json
file_exists = out_config.json
file_exists = out_descriptor.json
file_exists = out_digest
file_valid_json = out_manifest.json
file_valid_json = out_config.json
file_valid_json = out_descriptor.json
file_contains = out_manifest.json, "org.example.manifest"
file_contains = out_manifest.json, "sha256:new-layer"
file_contains = out_manifest.json, "org.example.layer"
file_contains = out_config.json, "rules_img"
file_contains = out_config.json, "sha256:new-diff"
file_contains = out_descriptor.json, "platform"
file_not_contains = out_manifest.json, "sha256:old-layer"
