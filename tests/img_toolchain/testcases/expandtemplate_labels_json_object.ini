[test]
name = expandtemplate_labels_json_object
description = expand-template parses a JSON object label file ({"key": "value"})

[file]
name = input.json
{
  "templates": {},
  "newline_delimited_lists_files": {
    "labels": "labels.json"
  }
}

[file]
name = labels.json
{
  "org.opencontainers.image.version": "1.0.0",
  "com.example.team": "platform"
}

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_exists = output.json, labels
file_contains = output.json, "org.opencontainers.image.version"
file_contains = output.json, "1.0.0"
file_contains = output.json, "com.example.team"
file_contains = output.json, "platform"
