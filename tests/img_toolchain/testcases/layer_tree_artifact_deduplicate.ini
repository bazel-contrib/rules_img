[test]
name = layer_tree_artifact_deduplicate
description = Test layer creation with tree artifacts (directories) using deduplicate_symlink mode

[file]
name = mydir/file1.txt
content for file 1

[file]
name = mydir/file2.txt
content for file 2

[file]
name = mydir/subdir/file3.txt
content for file 3

[testdata]
copy = add_files=img_toolchain/layer_tree_artifact/add_files

[command]
subcommand = layer
args = --add-from-file add_files --layer-tree-artifact-handling deduplicate_symlink --metadata layer_meta.json layer.tar.gz
expect_exit = 0

[assert]
file_exists = layer.tar.gz
file_size_gt = layer.tar.gz, 0
file_sha256 = layer.tar.gz, "78c9a612cc0421284f53e587f05f20c50ea815f8b4534c9f3a369203e5785ba3"
tar_entry_exists = layer.tar.gz, data/
tar_entry_type = layer.tar.gz, data/, dir
tar_entry_size = layer.tar.gz, data/file1.txt, 18
tar_entry_size = layer.tar.gz, data/file2.txt, 18
tar_entry_size = layer.tar.gz, data/subdir/file3.txt, 18
tar_entry_exists = layer.tar.gz, data_copy
tar_entry_type = layer.tar.gz, data_copy, symlink
layer_invariants_intact = layer.tar.gz
