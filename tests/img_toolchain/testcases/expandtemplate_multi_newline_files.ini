[test]
name = expandtemplate_multi_newline_files
description = Test expand-template with multiple newline-delimited files for a single key

[file]
name = input.json
{
  "templates": {
    "labels": {"existing_key": "existing_value"}
  },
  "newline_delimited_lists_files": {
    "labels": ["labels1.txt", "labels2.txt"]
  }
}

[file]
name = labels1.txt
org.opencontainers.image.version=1.0.0
org.opencontainers.image.authors=team@example.com

[file]
name = labels2.txt
org.opencontainers.image.source=https://github.com/example/repo
custom.label=custom_value

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
file_contains = output.json, "existing_key"
file_contains = output.json, "existing_value"
file_contains = output.json, "org.opencontainers.image.version"
file_contains = output.json, "1.0.0"
file_contains = output.json, "org.opencontainers.image.authors"
file_contains = output.json, "team@example.com"
file_contains = output.json, "org.opencontainers.image.source"
file_contains = output.json, "https://github.com/example/repo"
file_contains = output.json, "custom.label"
file_contains = output.json, "custom_value"
