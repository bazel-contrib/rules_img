[test]
name = sparseocilayout_tar
description = Sparse OCI layout assembly with tar format output

[file]
name = manifest.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "size": 1469,
    "digest": "sha256:b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5"
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "size": 1024,
      "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1"
    }
  ]
}

[file]
name = config.json
{
  "architecture": "amd64",
  "os": "linux",
  "config": {
    "Env": ["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"],
    "Cmd": ["/bin/sh"]
  },
  "rootfs": {
    "type": "layers",
    "diff_ids": [
      "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1"
    ]
  }
}

[file]
name = layer1_metadata.json
{
  "name": "layer1",
  "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1",
  "size": 1024,
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip"
}

[command]
subcommand = sparse-oci-layout
args = --manifest manifest.json --config config.json --layer layer1_metadata.json --format tar --output sparse-layout.tar
expect_exit = 0

[assert]
file_exists = sparse-layout.tar
file_size_gt = sparse-layout.tar, 100
# Tar entries for sparse layout structure
tar_entry_exists = sparse-layout.tar, sparse-oci-layout
tar_entry_exists = sparse-layout.tar, root.descriptor.json
tar_entry_exists = sparse-layout.tar, blobs/
tar_entry_exists = sparse-layout.tar, blobs/sha256/
# Must NOT have standard OCI layout entries
tar_entry_not_exists = sparse-layout.tar, oci-layout
tar_entry_not_exists = sparse-layout.tar, index.json
# Config blob present in tar
tar_entry_exists = sparse-layout.tar, blobs/sha256/b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5
tar_entry_type = sparse-layout.tar, blobs/sha256/b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5, regular
# Layer blob NOT in tar
tar_entry_not_exists = sparse-layout.tar, blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1
# Layer descriptor file present in tar
tar_entry_exists = sparse-layout.tar, blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json
tar_entry_type = sparse-layout.tar, blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, regular
# Whole-tar byte pin: detects any change to entry order or content
file_sha256 = sparse-layout.tar, "5d8b545164d2f8ac1d63a2ccda5af3e9dfc330da17271bed7c5c94be531b3979"
