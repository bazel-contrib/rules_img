[test]
name = sparseocilayout_layer_annotations
description = Sparse OCI layout preserves layer annotations in descriptor files

[file]
name = manifest.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "size": 100,
    "digest": "sha256:b5b2b2c5072406148de34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9b2c5"
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "size": 1024,
      "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1",
      "annotations": {
        "org.opencontainers.image.title": "app-layer.tar.gz",
        "com.example.build.id": "12345"
      }
    }
  ]
}

[file]
name = config.json
{
  "architecture": "amd64",
  "os": "linux"
}

[file]
name = layer1_metadata.json
{
  "name": "layer1",
  "digest": "sha256:a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1",
  "size": 1024,
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
  "annotations": {
    "org.opencontainers.image.title": "app-layer.tar.gz",
    "com.example.build.id": "12345"
  }
}

[command]
subcommand = sparse-oci-layout
args = --manifest manifest.json --config config.json --layer layer1_metadata.json --output sparse-output
expect_exit = 0

[assert]
file_exists = sparse-output/sparse-oci-layout
file_exists = sparse-output/root.descriptor.json
# Layer descriptor file present with annotations
file_exists = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json
file_valid_json = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "org.opencontainers.image.title"
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "app-layer.tar.gz"
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "com.example.build.id"
file_contains = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1.descriptor.json, "12345"
# Layer blob NOT present
file_not_exists = sparse-output/blobs/sha256/a1a1a1c507240614ade34c2e87b1b0d4e98a8e99e4b1a4d8b48adf2e07f9a1a1
