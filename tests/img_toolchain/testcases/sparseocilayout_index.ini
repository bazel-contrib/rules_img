[test]
name = sparseocilayout_index
description = Sparse OCI layout with image index (multi-platform) - root descriptor points to index blob

[file]
name = index.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.index.v1+json",
  "manifests": [
    {
      "mediaType": "application/vnd.oci.image.manifest.v1+json",
      "digest": "sha256:aaaa1111bbbb2222cccc3333dddd4444eeee5555ffff6666aaaa1111bbbb2222",
      "size": 500,
      "platform": {
        "architecture": "amd64",
        "os": "linux"
      }
    },
    {
      "mediaType": "application/vnd.oci.image.manifest.v1+json",
      "digest": "sha256:1111aaaa2222bbbb3333cccc4444dddd5555eeee6666ffff1111aaaa2222bbbb",
      "size": 500,
      "platform": {
        "architecture": "arm64",
        "os": "linux"
      }
    }
  ]
}

[file]
name = manifest_amd64.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "size": 100,
    "digest": "sha256:aabbccdd11223344556677889900aabbccdd11223344556677889900aabbccdd"
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "size": 4096,
      "digest": "sha256:dd11223344556677889900aabbccddee11223344556677889900aabbccddee11"
    }
  ]
}

[file]
name = config_amd64.json
{
  "architecture": "amd64",
  "os": "linux"
}

[file]
name = manifest_arm64.json
{
  "schemaVersion": 2,
  "mediaType": "application/vnd.oci.image.manifest.v1+json",
  "config": {
    "mediaType": "application/vnd.oci.image.config.v1+json",
    "size": 100,
    "digest": "sha256:eeff00112233445566778899aabbccddeeff00112233445566778899aabbccdd"
  },
  "layers": [
    {
      "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip",
      "size": 8192,
      "digest": "sha256:ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee"
    }
  ]
}

[file]
name = config_arm64.json
{
  "architecture": "arm64",
  "os": "linux"
}

[file]
name = layer_amd64_metadata.json
{
  "name": "layer_amd64",
  "digest": "sha256:dd11223344556677889900aabbccddee11223344556677889900aabbccddee11",
  "size": 4096,
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip"
}

[file]
name = layer_arm64_metadata.json
{
  "name": "layer_arm64",
  "digest": "sha256:ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee",
  "size": 8192,
  "mediaType": "application/vnd.oci.image.layer.v1.tar+gzip"
}

[command]
subcommand = sparse-oci-layout
args = --index index.json --manifest-path manifest_amd64.json --config-path config_amd64.json --manifest-path manifest_arm64.json --config-path config_arm64.json --layer layer_amd64_metadata.json --layer layer_arm64_metadata.json --output sparse-output
expect_exit = 0

[assert]
# Sparse OCI layout marker
file_exists = sparse-output/sparse-oci-layout
file_valid_json = sparse-output/sparse-oci-layout
file_contains = sparse-output/sparse-oci-layout, "1.0.0"
file_not_exists = sparse-output/oci-layout
file_not_exists = sparse-output/index.json
# Root descriptor points to index
file_exists = sparse-output/root.descriptor.json
file_valid_json = sparse-output/root.descriptor.json
file_contains = sparse-output/root.descriptor.json, "application/vnd.oci.image.index.v1+json"
# Config blobs present for both platforms
file_exists = sparse-output/blobs/sha256/aabbccdd11223344556677889900aabbccdd11223344556677889900aabbccdd
file_exists = sparse-output/blobs/sha256/eeff00112233445566778899aabbccddeeff00112233445566778899aabbccdd
# Layer blobs NOT present
file_not_exists = sparse-output/blobs/sha256/dd11223344556677889900aabbccddee11223344556677889900aabbccddee11
file_not_exists = sparse-output/blobs/sha256/ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee
# Layer descriptor files present
file_exists = sparse-output/blobs/sha256/dd11223344556677889900aabbccddee11223344556677889900aabbccddee11.descriptor.json
file_valid_json = sparse-output/blobs/sha256/dd11223344556677889900aabbccddee11223344556677889900aabbccddee11.descriptor.json
file_exists = sparse-output/blobs/sha256/ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee.descriptor.json
file_valid_json = sparse-output/blobs/sha256/ff00112233445566778899aabbccddeeff00112233445566778899aabbccddee.descriptor.json
