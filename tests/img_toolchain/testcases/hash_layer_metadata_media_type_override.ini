[test]
name = hash_layer_metadata_media_type_override
description = Test hash command with layer-metadata encoding and custom media-type override (e.g. Helm chart)

[testdata]
copy = layer.tar.gz=img_toolchain/hash_tests/test_layer.tar.gz

[command]
subcommand = hash
args = --encoding=layer-metadata --name=helm-layer --media-type=application/vnd.cncf.helm.chart.content.v1.tar layer.tar.gz metadata.json
expect_exit = 0

[assert]
file_exists = metadata.json
file_valid_json = metadata.json
json_field_exists = metadata.json, name
json_field_exists = metadata.json, digest
json_field_exists = metadata.json, mediaType
json_field_equals = metadata.json, name, helm-layer
json_field_equals = metadata.json, mediaType, application/vnd.cncf.helm.chart.content.v1.tar
json_field_exists = metadata.json, size
json_field_exists = metadata.json, diff_id
