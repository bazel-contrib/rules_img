[test]
name = layer_annotations_file_json
description = layer --annotations-file accepts a JSON file; --annotation flags take precedence

[file]
name = hello.txt
Hello World

[file]
name = annotations.json
{
  "org.opencontainers.image.version": "from-file",
  "build.date": "2024-01-15"
}

[command]
subcommand = layer
args = --add /hello.txt=hello.txt --annotation org.opencontainers.image.version=from-flag --annotations-file annotations.json --metadata metadata.json layer.tar.gz
expect_exit = 0

[assert]
file_exists = layer.tar.gz
file_exists = metadata.json
file_valid_json = metadata.json
json_field_exists = metadata.json, annotations
# File-only annotation is present.
file_contains = metadata.json, "build.date"
file_contains = metadata.json, "2024-01-15"
# Command-line --annotation wins over the file for a shared key.
file_contains = metadata.json, "from-flag"
file_not_contains = metadata.json, "from-file"
