[test]
name = expandtemplate_annotations_json_merge
description = expand-template merges a JSON annotations file with existing annotations; file values take precedence

[file]
name = input.json
{
  "templates": {
    "annotations": {
      "org.opencontainers.image.version": "from-attribute",
      "keep.me": "kept"
    }
  },
  "newline_delimited_lists_files": {
    "annotations": "annotations.json"
  }
}

[file]
name = annotations.json
{
  "org.opencontainers.image.version": "from-file",
  "build.date": "2024-01-15"
}

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_exists = output.json, annotations
# Existing-only key is preserved.
file_contains = output.json, "keep.me"
file_contains = output.json, "kept"
# File-only key is added.
file_contains = output.json, "build.date"
file_contains = output.json, "2024-01-15"
# File value wins over the attribute value for a shared key.
file_contains = output.json, "from-file"
file_not_contains = output.json, "from-attribute"
