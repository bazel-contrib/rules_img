[test]
name = manifest_config_media_type_requires_fragment
description = Test that manifest with --config-media-type without --config-fragment fails with error

[command]
subcommand = manifest
args = --config-media-type=application/vnd.cncf.helm.config.v1+json --manifest=manifest.json --config=config.json
expect_exit = 1

[assert]
stderr_contains = "requires --config-fragment"
