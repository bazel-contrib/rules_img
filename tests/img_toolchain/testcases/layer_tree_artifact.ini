[test]
name = layer_tree_artifact
description = Test layer creation with tree artifacts (directories) using full mode (no tree-level dedup)

[file]
name = mydir/file1.txt
content for file 1

[file]
name = mydir/file2.txt
content for file 2

[file]
name = mydir/subdir/file3.txt
content for file 3

[testdata]
copy = add_files=img_toolchain/layer_tree_artifact/add_files

[command]
subcommand = layer
args = --add-from-file add_files --layer-tree-artifact-handling full --metadata layer_meta.json layer.tar.gz
expect_exit = 0

[assert]
file_exists = layer.tar.gz
file_size_gt = layer.tar.gz, 0
file_sha256 = layer.tar.gz, "f602c0517bcda9fd747227c856d841bddebff805879151777d7bd4e6006624ce"
tar_entry_exists = layer.tar.gz, data/
tar_entry_type = layer.tar.gz, data/, dir
tar_entry_exists = layer.tar.gz, data/file1.txt
tar_entry_type = layer.tar.gz, data/file1.txt, regular
tar_entry_size = layer.tar.gz, data/file1.txt, 18
tar_entry_exists = layer.tar.gz, data/file2.txt
tar_entry_type = layer.tar.gz, data/file2.txt, regular
tar_entry_size = layer.tar.gz, data/file2.txt, 18
tar_entry_exists = layer.tar.gz, data/subdir/file3.txt
tar_entry_type = layer.tar.gz, data/subdir/file3.txt, regular
tar_entry_size = layer.tar.gz, data/subdir/file3.txt, 18
tar_entry_exists = layer.tar.gz, data_copy/
tar_entry_type = layer.tar.gz, data_copy/, dir
tar_entry_exists = layer.tar.gz, data_copy/file1.txt
tar_entry_type = layer.tar.gz, data_copy/file1.txt, link
tar_entry_exists = layer.tar.gz, data_copy/file2.txt
tar_entry_type = layer.tar.gz, data_copy/file2.txt, link
tar_entry_exists = layer.tar.gz, data_copy/subdir/file3.txt
tar_entry_type = layer.tar.gz, data_copy/subdir/file3.txt, link
layer_invariants_intact = layer.tar.gz
