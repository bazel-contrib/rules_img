[test]
name = mtree_merge_tar
description = Merge two mtree inputs (tar layout): concatenated in order, "./" paths normalized to bare/"foo/" form, and unsupported/unrequested keywords stripped.

# Input A. Uses the "./" path form and carries keywords we do not support
# (cksum, flags) plus one we won't request (nlink) -- all must be stripped.
[file]
name = a.mtree
./etc type=dir mode=0755 uid=0 gid=0 time=100 nlink=1
./etc/hosts type=file size=10 mode=0644 uid=0 gid=0 sha256digest=1111111111111111111111111111111111111111111111111111111111111111 time=100 cksum=999 flags=none nlink=1

# Input B. Also "./" form, with unsupported digests (sha1/md5/sha512) to strip
# and a file under a directory (opt) that only input B references.
[file]
name = b.mtree
./etc/hosts type=file size=20 mode=0600 uid=1000 gid=1000 sha256digest=2222222222222222222222222222222222222222222222222222222222222222 time=200 sha1digest=deadbeef md5digest=abcd nlink=1
./opt/app type=file size=5 mode=0755 uid=0 gid=0 sha256digest=3333333333333333333333333333333333333333333333333333333333333333 time=300 sha512digest=cafe nlink=1

[command]
subcommand = mtree
args = --mtree a.mtree --mtree b.mtree --path-prefix= --options type,size,mode,uid,gid,sha256,time --layout tar --output merged.mtree
expect_exit = 0

[assert]
file_exists = merged.mtree
# Paths are re-normalized: "./" is dropped and the directory gains a trailing "/".
file_contains = merged.mtree, "etc/ type=dir mode=0755 uid=0 gid=0 time=100"
# The tar layout concatenates both inputs in order, so BOTH etc/hosts survive.
file_contains = merged.mtree, "etc/hosts type=file size=10 mode=0644 uid=0 gid=0 sha256digest=1111111111111111111111111111111111111111111111111111111111111111 time=100"
file_contains = merged.mtree, "etc/hosts type=file size=20 mode=0600 uid=1000 gid=1000 sha256digest=2222222222222222222222222222222222222222222222222222222222222222 time=200"
file_contains = merged.mtree, "opt/app type=file size=5 mode=0755 uid=0 gid=0 sha256digest=3333333333333333333333333333333333333333333333333333333333333333 time=300"
# No "./" prefix survives normalization.
file_not_contains = merged.mtree, "./"
# Unsupported keywords are stripped.
file_not_contains = merged.mtree, "cksum"
file_not_contains = merged.mtree, "flags"
file_not_contains = merged.mtree, "sha1digest"
file_not_contains = merged.mtree, "md5digest"
file_not_contains = merged.mtree, "sha512digest"
# A supported keyword that was not requested (nlink) is stripped too.
file_not_contains = merged.mtree, "nlink"
