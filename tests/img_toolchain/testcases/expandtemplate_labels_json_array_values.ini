[test]
name = expandtemplate_labels_json_array_values
description = expand-template parses a JSON object label file with list values ({"key": ["v1", "v2"]}); last value wins

[file]
name = input.json
{
  "templates": {},
  "newline_delimited_lists_files": {
    "labels": "labels.json"
  }
}

[file]
name = labels.json
{
  "com.example.stage": ["alpha", "beta", "release"]
}

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_exists = output.json, labels
file_contains = output.json, "com.example.stage"
# The last value in the list wins when flattened to a single label value.
file_contains = output.json, "release"
file_not_contains = output.json, "alpha"
file_not_contains = output.json, "beta"
