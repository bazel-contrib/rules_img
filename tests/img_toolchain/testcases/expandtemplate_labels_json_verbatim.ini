[test]
name = expandtemplate_labels_json_verbatim
description = expand-template preserves JSON object values verbatim, including '=' and spaces

[file]
name = input.json
{
  "templates": {},
  "newline_delimited_lists_files": {
    "labels": "labels.json"
  }
}

[file]
name = labels.json
{
  "com.example.equation": "x=y+1",
  "com.example.description": "hello there world"
}

[command]
subcommand = expand-template
args = input.json output.json
expect_exit = 0

[assert]
file_exists = output.json
file_valid_json = output.json
json_field_exists = output.json, labels
# Values from JSON objects are used verbatim, so '=' and spaces survive.
file_contains = output.json, "x=y+1"
file_contains = output.json, "hello there world"
