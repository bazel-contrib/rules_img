[test]
name = manifest_env_file_json
description = manifest --env-file accepts a JSON env file; --env still takes precedence

[file]
name = env.json
{
  "APP_NAME": "myapp",
  "APP_PORT": "8080",
  "PATH": "/usr/local/bin:/usr/bin"
}

[command]
subcommand = manifest
args = --env PATH=/override --env-file env.json --manifest manifest.json --config config.json
expect_exit = 0

[assert]
file_exists = manifest.json
file_exists = config.json
file_valid_json = manifest.json
file_valid_json = config.json
json_field_exists = config.json, config
file_contains = config.json, "APP_NAME=myapp"
file_contains = config.json, "APP_PORT=8080"
file_contains = config.json, "PATH=/override"
file_not_contains = config.json, "PATH=/usr/local/bin:/usr/bin"
