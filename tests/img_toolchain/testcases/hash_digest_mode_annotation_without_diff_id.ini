[test]
name = hash_digest_mode_annotation_without_diff_id
description = Test hash with digest + diff_id_annotation but without diff_id mode

[testdata]
copy = layer.tar.gz=img_toolchain/hash_tests/test_layer.tar.gz

[command]
subcommand = hash
args = --encoding=layer-metadata --digest-mode=digest --digest-mode=diff_id_annotation:io.containerd.image.uncompressed --history=annotation-layer layer.tar.gz metadata.json
expect_exit = 0

[assert]
file_exists = metadata.json
file_valid_json = metadata.json
json_field_exists = metadata.json, digest
json_field_exists = metadata.json, annotations
file_contains = metadata.json, "annotation-layer"
file_not_contains = metadata.json, diff_id
file_contains = metadata.json, io.containerd.image.uncompressed
