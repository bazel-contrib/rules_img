[test]
name = manifest_config_media_type
description = Test manifest with custom config media type (e.g. Helm) using config-fragment as full config blob

[file]
name = helm_config.json
{"name":"test-chart","version":"1.0.0"}

[command]
subcommand = manifest
args = --config-media-type=application/vnd.cncf.helm.config.v1+json --config-fragment=helm_config.json --manifest=manifest.json --config=config.json
expect_exit = 0

[assert]
file_exists = manifest.json
file_exists = config.json
file_valid_json = manifest.json
file_valid_json = config.json
json_field_exists = manifest.json, config
file_contains = manifest.json, "application/vnd.cncf.helm.config.v1+json"
file_contains = config.json, "test-chart"
file_contains = config.json, "1.0.0"
